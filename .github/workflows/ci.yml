name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.app

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate project
        # Regenerate the .xcodeproj from project.yml with the CI's own toolchain,
        # rather than relying on the committed pbxproj (which may have been
        # generated by a newer Xcode and use a project format this runner can't read).
        run: xcodegen generate

      - name: List available simulators (diagnostics)
        run: |
          echo "=== runtimes ==="; xcrun simctl list runtimes
          echo "=== devices (available) ==="; xcrun simctl list devices available

      - name: Run tests
        run: |
          UDID=$(bash scripts/ci-pick-simulator.sh)
          echo "Using simulator UDID: $UDID"
          xcrun simctl boot "$UDID" || true
          xcrun simctl bootstatus "$UDID" -b || true
          xcodebuild test \
            -project TestHostApp.xcodeproj \
            -scheme TestHostApp \
            -destination "id=$UDID" \
            -resultBundlePath TestResults.xcresult

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: TestResults
          path: TestResults.xcresult
